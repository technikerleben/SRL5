<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBG · SRL Klasse 5 · Startpaket</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="hbg-cd.css">
</head>
<body data-page="start">
<div id="loading"><strong>Startpaket im HBG Design</strong>Die interaktive Startpaket-Seite wird geladen.</div>
<div id="app"></div>
<script>
(async function initStart(){
  const app=document.getElementById('app');
  const loading=document.getElementById('loading');
  try{
    const response=await fetch('/original-start.html',{cache:'no-store'});
    if(!response.ok) throw new Error('original-start.html konnte nicht geladen werden');
    const source=await response.text();
    const parsed=new DOMParser().parseFromString(source,'text/html');
    app.innerHTML=parsed.body.innerHTML;
    loading.remove();
    document.querySelectorAll('a[href="https://srl-5.vercel.app"]').forEach(link=>{
      link.setAttribute('href','/');
      link.textContent='Vollständiges Arbeitspapier → Startseite';
    });
    parsed.querySelectorAll('script').forEach(oldScript=>{
      const script=document.createElement('script');
      [...oldScript.attributes].forEach(attr=>script.setAttribute(attr.name,attr.value));
      script.textContent=oldScript.textContent;
      document.body.appendChild(script);
    });
  }catch(error){
    loading.innerHTML='<strong>Fehler beim Laden</strong>Die gesicherte Originalseite konnte nicht eingebunden werden.';
    console.error(error);
  }
})();
</script>
</body>
</html>
