<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=/">
<title>Weiterleitung · HBG SRL Klasse 5</title>
<style>
  :root {
    --hbg-rot:#791D22;
    --hbg-blau:#245688;
    --hbg-bg:#F7F5F2;
    --hbg-text:#2B2B2B;
    --font-title:"Gagalin","Anton","Archivo Black",sans-serif;
    --font-body:"Glacial Indifference","Jost","Mulish","Helvetica Neue",Arial,sans-serif;
  }
  body{min-height:100vh;display:grid;place-items:center;margin:0;background:var(--hbg-bg);color:var(--hbg-text);font-family:var(--font-body)}
  main{max-width:38rem;padding:2rem;border-left:.5rem solid var(--hbg-rot);background:#fff;border-radius:1rem;box-shadow:0 20px 48px rgba(36,86,136,.16)}
  h1{font-family:var(--font-title);font-weight:400;color:var(--hbg-rot);margin:.2rem 0 .8rem}
  a{color:var(--hbg-blau)}
</style>
</head>
<body>
<main>
  <h1>Weiterleitung</h1>
  <p>Die CD-Fassung liegt jetzt direkt auf der Startseite.</p>
  <p><a href="/">Zur Startseite</a></p>
</main>
<script>location.replace('/');</script>
</body>
</html>
