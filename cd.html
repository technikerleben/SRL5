<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBG · SRL Klasse 5</title>
<style>
  :root {
    --hbg-rot-dunkel: #571015;
    --hbg-rot: #791D22;
    --hbg-rot-mittel: #B14C52;
    --hbg-rot-blass: #E8C9CB;
    --hbg-rot-ghost: #F8EEEE;
    --hbg-blau-dunkel: #163A5C;
    --hbg-blau: #245688;
    --hbg-blau-mittel: #6C93B8;
    --hbg-blau-blass: #CBDBE9;
    --hbg-blau-ghost: #EFF4F9;
    --hbg-gruen-dunkel: #2F4A38;
    --hbg-gruen: #3F6B4D;
    --hbg-gruen-mittel: #7C9C82;
    --hbg-gruen-blass: #D6E3D2;
    --hbg-gruen-ghost: #EFF5EE;
    --hbg-text: #2B2B2B;
    --hbg-text-muted: #6B6B6B;
    --hbg-border: #D9D5CF;
    --hbg-bg: #F7F5F2;
    --hbg-weiss: #FFFFFF;
    --hbg-warnung: #B8791E;
    --hbg-fehler: #A62B2B;
    --hbg-erfolg: #2E6E6E;
    --hbg-sandstein: #C9A876;

    --font-title: "Gagalin", "Anton", "Archivo Black", sans-serif;
    --font-body: "Glacial Indifference", "Jost", "Mulish", "Helvetica Neue", Arial, sans-serif;

    --navy: var(--hbg-blau-dunkel);
    --navy-mid: var(--hbg-blau);
    --navy-light: var(--hbg-blau-mittel);
    --accent: var(--hbg-rot);
    --accent-dim: var(--hbg-rot-mittel);
    --bg: var(--hbg-bg);
    --bg-card: var(--hbg-weiss);
    --text: var(--hbg-text);
    --text-mid: var(--hbg-text);
    --text-light: var(--hbg-text-muted);
    --border: var(--hbg-border);
    --kl-bg: var(--hbg-gruen-ghost);
    --kl-border: var(--hbg-gruen);
    --kl-head: var(--hbg-gruen-dunkel);
    --fl-bg: var(--hbg-blau-ghost);
    --fl-border: var(--hbg-blau);
    --fl-head: var(--hbg-blau-dunkel);
    --neu: var(--hbg-rot);
    --neu-light: var(--hbg-rot-ghost);
    --neu-border: var(--hbg-rot-mittel);
    --neu-badge: var(--hbg-rot-dunkel);
    --nav-w: 280px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-body);
    background:
      radial-gradient(circle at top right, rgba(121,29,34,0.10), transparent 28rem),
      linear-gradient(135deg, var(--hbg-bg), var(--hbg-blau-ghost));
    color: var(--hbg-text);
    display: flex;
    min-height: 100vh;
    font-size: 16px;
    line-height: 1.72;
  }
  body.loading { display: block; }
  #loading {
    max-width: 720px;
    margin: 12vh auto;
    padding: 28px 32px;
    border-radius: 22px;
    background: var(--hbg-weiss);
    border: 1px solid var(--hbg-border);
    box-shadow: 0 22px 55px rgba(22,58,92,0.13);
    font-family: var(--font-body);
  }
  #loading strong {
    display: block;
    font-family: var(--font-title);
    font-weight: 400;
    letter-spacing: 0.03em;
    color: var(--hbg-rot);
    font-size: 1.6rem;
    margin-bottom: 0.35rem;
  }
  #app { display: contents; }

  #sidebar {
    width: var(--nav-w);
    min-width: var(--nav-w);
    background: linear-gradient(180deg, var(--hbg-blau-dunkel), var(--hbg-blau));
    min-height: 100vh;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    z-index: 100;
    transition: transform 0.3s ease;
    box-shadow: 10px 0 28px rgba(22,58,92,0.18);
  }
  #sidebar::-webkit-scrollbar { width: 6px; }
  #sidebar::-webkit-scrollbar-track { background: transparent; }
  #sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.28); border-radius: 999px; }

  .sidebar-logo {
    padding: 24px 20px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.18);
  }
  .hbg-brand {
    background: var(--hbg-weiss);
    color: var(--hbg-rot);
    border-radius: 14px;
    padding: 12px 14px 10px;
    margin-bottom: 16px;
    border-left: 7px solid var(--hbg-rot);
    box-shadow: 0 10px 22px rgba(0,0,0,0.13);
  }
  .hbg-brand-main {
    font-family: var(--font-title);
    font-weight: 400;
    font-size: 1rem;
    line-height: 1.05;
    letter-spacing: 0.04em;
  }
  .hbg-brand-sub {
    margin-top: 4px;
    color: var(--hbg-blau);
    font-size: 0.62rem;
    letter-spacing: 0.10em;
    text-transform: uppercase;
  }
  .sidebar-logo .doc-type {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--hbg-rot-blass);
    font-weight: 400;
    margin-bottom: 6px;
  }
  .sidebar-logo h2 {
    font-family: var(--font-title);
    font-weight: 400;
    font-size: 1.03rem;
    color: var(--hbg-weiss);
    line-height: 1.25;
    letter-spacing: 0.02em;
  }
  .sidebar-logo .doc-sub {
    font-size: 0.74rem;
    color: rgba(255,255,255,0.66);
    margin-top: 8px;
  }

  nav { padding: 12px 0 26px; flex: 1; font-family: var(--font-body); }
  .nav-chapter { margin-top: 6px; }
  .nav-chapter-label {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px 6px;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.62);
    user-select: none;
  }
  .nav-chapter-label .ch-num {
    background: rgba(255,255,255,0.14);
    color: var(--hbg-weiss);
    font-size: 0.68rem;
    font-weight: 400;
    width: 23px;
    height: 23px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.16);
  }
  .nav-items { display: block; }
  .nav-link {
    display: block;
    padding: 7px 16px 7px 49px;
    font-size: 0.81rem;
    color: rgba(255,255,255,0.72);
    text-decoration: none;
    border-left: 4px solid transparent;
    transition: color 0.15s, background 0.15s, border-color 0.15s;
    line-height: 1.38;
  }
  .nav-link:hover { color: var(--hbg-weiss); background: rgba(255,255,255,0.08); }
  .nav-link.active {
    color: var(--hbg-weiss);
    background: rgba(121,29,34,0.40);
    border-left-color: var(--hbg-rot-blass);
  }
  .nav-link.top-link { padding-left: 18px; color: rgba(255,255,255,0.84); font-weight: 400; }
  .nav-divider { height: 1px; background: rgba(255,255,255,0.12); margin: 10px 18px; }

  #hamburger {
    display: none;
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 200;
    background: var(--hbg-blau);
    border: none;
    border-radius: 12px;
    width: 46px;
    height: 46px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 5px;
    box-shadow: 0 8px 24px rgba(22,58,92,0.28);
  }
  #hamburger span { display:block; width:22px; height:2px; background:var(--hbg-weiss); border-radius:99px; transition:all 0.3s; }
  #sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:99; }

  #content {
    flex: 1;
    max-width: 940px;
    padding: 54px 64px 84px;
    min-width: 0;
  }
  .doc-header {
    position: relative;
    margin-bottom: 56px;
    padding: 34px 36px 32px;
    border: 1px solid var(--hbg-border);
    border-radius: 28px;
    background: rgba(255,255,255,0.86);
    box-shadow: 0 24px 58px rgba(22,58,92,0.12);
    overflow: hidden;
  }
  .doc-header::before {
    content: "";
    position: absolute;
    inset: 0 auto 0 0;
    width: 12px;
    background: linear-gradient(180deg, var(--hbg-rot), var(--hbg-blau));
  }
  .doc-header .kuerzel {
    font-size: 0.76rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--hbg-rot);
    font-weight: 400;
    margin-bottom: 12px;
  }
  .doc-header h1, .chapter-title, .chapter-num, h1, h2, h3, h4, .modul-title {
    font-family: var(--font-title);
    font-weight: 400;
    letter-spacing: 0.01em;
  }
  .doc-header h1 {
    font-size: clamp(2.1rem, 4vw, 3.6rem);
    color: var(--hbg-blau-dunkel);
    line-height: 1.03;
    margin-bottom: 12px;
  }
  .doc-header .subtitle { font-size: 1.12rem; color: var(--hbg-text); max-width: 44rem; }
  .doc-meta { display:flex; gap:10px; flex-wrap:wrap; margin-top:22px; }
  .doc-meta span {
    font-size: 0.8rem;
    color: var(--hbg-text);
    background: var(--hbg-blau-ghost);
    border: 1px solid var(--hbg-blau-blass);
    padding: 5px 13px;
    border-radius: 999px;
  }

  .startpaket-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-top: 24px;
    padding: 11px 20px;
    background: var(--hbg-rot);
    color: var(--hbg-weiss) !important;
    font-family: var(--font-body);
    font-size: 0.86rem;
    text-decoration: none !important;
    border-radius: 13px;
    border: 2px solid var(--hbg-rot);
    transition: transform 0.15s, background 0.15s, border-color 0.15s;
    box-shadow: 0 10px 24px rgba(121,29,34,0.22);
  }
  .startpaket-btn:hover { transform: translateY(-1px); background: var(--hbg-blau); border-color: var(--hbg-blau); }
  .startpaket-btn .btn-sub { display:block; opacity:0.82; font-size:0.74rem; line-height:1.1; }

  .chapter { margin-bottom: 68px; }
  .chapter-header {
    display:flex;
    align-items:baseline;
    gap:16px;
    margin-bottom:30px;
    padding-bottom:14px;
    border-bottom: 2px solid var(--hbg-blau-blass);
  }
  .chapter-num { font-size: 2.55rem; color: var(--hbg-rot); line-height:1; flex-shrink:0; }
  .chapter-title { font-size: 1.55rem; color: var(--hbg-blau-dunkel); line-height:1.18; }
  .section { margin-bottom: 42px; }
  .section-title {
    font-family: var(--font-body);
    font-size: 1.04rem;
    font-weight: 400;
    color: var(--hbg-blau-dunkel);
    margin-bottom: 14px;
    display:flex;
    align-items:baseline;
    gap:10px;
  }
  .section-title .snum, .sub-section-title .ssnum {
    font-family: var(--font-title);
    color: var(--hbg-rot);
    min-width: 34px;
    font-weight: 400;
  }
  .sub-section { margin-bottom:32px; padding-left:20px; border-left:3px solid var(--hbg-blau-blass); }
  .sub-section-title { color: var(--hbg-blau); margin-bottom: 10px; display:flex; gap:8px; }
  p { margin-bottom: 0.86em; color: var(--hbg-text); }
  ul { margin: 0 0 1rem 1.4rem; padding-left: 1rem; }
  li { margin-bottom: 0.25rem; }
  #content a { color: var(--hbg-rot); text-decoration: none; border-bottom: 1px solid var(--hbg-rot-blass); }
  #content a:hover { color: var(--hbg-blau); border-bottom-color: var(--hbg-blau-blass); }

  .placeholder {
    background: repeating-linear-gradient(-45deg, var(--hbg-bg), var(--hbg-bg) 6px, var(--hbg-blau-ghost) 6px, var(--hbg-blau-ghost) 12px);
    border: 1.5px dashed var(--hbg-blau-mittel);
    border-radius: 12px;
    padding: 18px 20px;
    color: var(--hbg-text-muted);
    font-style: italic;
    min-height: 80px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .placeholder::before { content:"✏️"; font-style:normal; flex-shrink:0; }
  .placeholder.tall { min-height:140px; }
  .placeholder.short { min-height:60px; }

  .modul-box, .anhang-item, .subchapter-body {
    background: rgba(255,255,255,0.94);
    border: 1.5px solid var(--hbg-border);
    border-radius: 18px;
    box-shadow: 0 12px 30px rgba(22,58,92,0.07);
  }
  .modul-box { margin-top:24px; padding:20px 24px; }
  .modul-box-title {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 400;
    margin-bottom: 10px;
    display:flex;
    align-items:center;
    gap:8px;
    color: var(--hbg-blau-dunkel);
  }
  .modul-box-title::before { content:""; display:block; width:10px; height:10px; border-radius:50%; background:currentColor; }
  .modul-box.kl { background: var(--hbg-gruen-ghost); border-color: var(--hbg-gruen-blass); }
  .modul-box.kl .modul-box-title { color: var(--hbg-gruen-dunkel); }
  .modul-box.fl { background: var(--hbg-blau-ghost); border-color: var(--hbg-blau-blass); }
  .modul-box.fl .modul-box-title { color: var(--hbg-blau-dunkel); }
  .modul-boxes-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:20px; }

  .subchapter { margin-bottom: 50px; }
  .subchapter-header {
    background: linear-gradient(90deg, var(--hbg-blau-dunkel), var(--hbg-blau));
    color: var(--hbg-weiss);
    border-radius: 18px 18px 0 0;
    padding: 13px 22px;
    font-size: 0.82rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 400;
  }
  .subchapter-body { border-top:none; border-radius: 0 0 18px 18px; padding: 30px 30px 26px; }
  .modul-card { margin-bottom: 38px; }
  .modul-card:last-child { margin-bottom: 0; }
  .modul-title {
    font-size: 1.08rem;
    color: var(--hbg-blau-dunkel);
    margin-bottom: 12px;
    display:flex;
    align-items:center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .modul-title img { filter: saturate(0.95) contrast(1.02); }
  .modul-badge, .badge-neu {
    background: var(--hbg-rot);
    color: var(--hbg-weiss);
    font-family: var(--font-body);
    font-size: 0.66rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 999px;
  }
  .modul-separator { border:none; border-top:1px solid var(--hbg-border); margin:30px 0; }
  .anhang-item { overflow:hidden; margin-bottom:22px; }
  .anhang-item-header {
    background: var(--hbg-blau-ghost);
    padding: 13px 20px;
    font-size: 0.84rem;
    font-weight: 400;
    color: var(--hbg-blau-dunkel);
    border-bottom: 1.5px solid var(--hbg-border);
    display:flex;
    align-items:center;
    gap:10px;
  }
  .anhang-item-body { padding: 22px; }

  .neu-passage {
    border-left: 5px solid var(--hbg-rot);
    background: var(--hbg-rot-ghost);
    padding: 14px 18px;
    border-radius: 0 14px 14px 0;
    margin: 16px 0;
    position: relative;
  }
  .neu-passage::before {
    content:"Neu";
    position:absolute;
    top:8px;
    right:12px;
    font-size:0.6rem;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--hbg-rot-mittel);
  }
  .modul-card.neu-modul { border-left: 4px solid var(--hbg-rot); padding-left:16px; margin-left:-16px; }

  table { font-family: var(--font-body); }
  .kompetenzraster, .stundenplan { width:100%; border-collapse:collapse; font-size:0.84rem; }
  .kompetenzraster th, .stundenplan th,
  td[colspan][style*="background:var(--navy)"] {
    background: var(--hbg-blau-dunkel) !important;
    color: var(--hbg-weiss) !important;
    font-weight: 400 !important;
  }
  .kompetenzraster td, .stundenplan td { border-color: var(--hbg-border) !important; color: var(--hbg-text) !important; }
  .kompetenzraster tr:nth-child(even) td { background: var(--hbg-bg) !important; }
  .kompetenzraster tr:hover td { background: var(--hbg-blau-ghost) !important; }
  .kompetenzraster .col-kompetenz { color: var(--hbg-blau-dunkel) !important; font-weight: 400 !important; }
  .level-1 { border-left: 3px solid var(--hbg-sandstein) !important; }
  .level-2 { border-left: 3px solid var(--hbg-gruen) !important; }
  .level-3 { border-left: 3px solid var(--hbg-blau) !important; }
  .placeholder-cell { color: var(--hbg-text) !important; }
  .sp-toggle-row { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .sp-toggle-btn {
    padding: 7px 18px;
    border: 1.5px solid var(--hbg-border);
    border-radius: 999px;
    background: var(--hbg-weiss);
    color: var(--hbg-text);
    font-family: var(--font-body);
    cursor: pointer;
  }
  .sp-toggle-btn.active, .sp-toggle-btn:hover { background: var(--hbg-blau); border-color: var(--hbg-blau); color: var(--hbg-weiss); }
  .std-num { font-weight: 400 !important; color: var(--hbg-rot) !important; background: var(--hbg-bg) !important; }
  .sp-fach { background: var(--hbg-blau-ghost) !important; border-left:4px solid var(--hbg-blau) !important; }
  .sp-lern { background: var(--hbg-rot-ghost) !important; border-left:4px solid var(--hbg-rot) !important; }
  .sp-mentor { background: var(--hbg-gruen-ghost) !important; border-left:4px solid var(--hbg-gruen) !important; }
  .sp-projekt { background: var(--hbg-blau-blass) !important; border-left:4px solid var(--hbg-blau-dunkel) !important; }
  .sp-foerder { background: var(--hbg-rot-blass) !important; border-left:4px solid var(--hbg-fehler) !important; }

  .doc-footer {
    margin-top:64px;
    padding-top:20px;
    border-top:1px solid var(--hbg-border);
    font-size:0.74rem;
    color:var(--hbg-text-muted);
    font-style:italic;
  }

  @media print {
    #sidebar, #hamburger, #sidebar-overlay { display:none !important; }
    #content { max-width:100%; padding:20px; }
    body { display:block; background:var(--hbg-weiss); }
    .chapter { page-break-inside:avoid; }
    .doc-header, .modul-box, .anhang-item, .subchapter-body { box-shadow:none; }
  }
  @media (max-width: 900px) {
    :root { --nav-w: 252px; }
    #content { padding: 38px 32px 64px; }
  }
  @media (max-width: 680px) {
    body { display:block; }
    #sidebar { position:fixed; left:0; top:0; transform:translateX(-100%); height:100%; z-index:150; }
    #sidebar.open { transform:translateX(0); }
    #sidebar-overlay.open { display:block; }
    #hamburger { display:flex; }
    #content { padding: 70px 20px 50px; max-width:100%; }
    .doc-header { padding: 26px 24px 24px; border-radius: 22px; }
    .doc-header h1 { font-size: 2rem; }
    .chapter-num { font-size: 1.8rem; }
    .chapter-title { font-size: 1.16rem; }
    .modul-boxes-row { grid-template-columns:1fr; }
    .doc-meta { flex-direction:column; gap:8px; }
    .subchapter-body { padding: 22px 18px; }
  }
</style>
</head>
<body class="loading">
<div id="loading"><strong>HBG Design wird geladen</strong>Das Arbeitspapier wird mit dem Corporate Design der Heinrich-Böll-Gesamtschule aufgebaut.</div>
<div id="app"></div>
<script>
(async function init() {
  const app = document.getElementById('app');
  const loading = document.getElementById('loading');
  try {
    const response = await fetch('/index.html', { cache: 'no-store' });
    if (!response.ok) throw new Error('index.html konnte nicht geladen werden');
    const source = await response.text();
    const parsed = new DOMParser().parseFromString(source, 'text/html');
    app.innerHTML = parsed.body.innerHTML;

    document.body.classList.remove('loading');
    loading.remove();

    document.querySelectorAll('a[href^="https://srl-5.vercel.app/#"]').forEach(link => {
      link.setAttribute('href', '#' + link.href.split('#')[1]);
    });
    document.querySelectorAll('a[href="start.html"], a[href="/start.html"]').forEach(link => {
      link.setAttribute('href', 'start-cd.html');
    });

    const sidebarLogo = document.querySelector('.sidebar-logo');
    if (sidebarLogo && !sidebarLogo.querySelector('.hbg-brand')) {
      sidebarLogo.insertAdjacentHTML('afterbegin', '<div class="hbg-brand"><div class="hbg-brand-main">HEINRICH-BÖLL-<br>GESAMTSCHULE</div><div class="hbg-brand-sub">Für dich. Für mich. Für uns.</div></div>');
    }

    setupNavigation();
  } catch (error) {
    loading.innerHTML = '<strong>Fehler beim Laden</strong>Die ursprüngliche index.html konnte nicht eingebunden werden. Bitte die Datei direkt prüfen.';
    console.error(error);
  }
})();

function setupNavigation() {
  const ham = document.getElementById('hamburger');
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebar-overlay');

  if (ham && sb && ov) {
    ham.addEventListener('click', () => {
      sb.classList.toggle('open');
      ov.classList.toggle('open');
    });
    ov.addEventListener('click', () => {
      sb.classList.remove('open');
      ov.classList.remove('open');
    });
  }

  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', () => {
      if (window.innerWidth <= 680 && sb && ov) {
        sb.classList.remove('open');
        ov.classList.remove('open');
      }
    });
  });

  const allSections = [];
  document.querySelectorAll('[id]').forEach(el => {
    if (el.id && !['sidebar','content','hamburger','sidebar-overlay','app'].includes(el.id)) allSections.push(el);
  });
  const navLinks = document.querySelectorAll('.nav-link[href^="#"]');
  function updateActive() {
    const scrollY = window.scrollY + 100;
    let current = '';
    allSections.forEach(sec => { if (sec.offsetTop <= scrollY) current = sec.id; });
    navLinks.forEach(link => {
      link.classList.remove('active');
      if (link.getAttribute('href') === '#' + current) link.classList.add('active');
    });
  }
  window.addEventListener('scroll', updateActive, { passive: true });
  updateActive();
}
