<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBG · SRL Klasse 5 · Startpaket</title>
<style>
  :root {
    --hbg-rot-dunkel: #571015;
    --hbg-rot: #791D22;
    --hbg-rot-mittel: #B14C52;
    --hbg-rot-blass: #E8C9CB;
    --hbg-rot-ghost: #F8EEEE;
    --hbg-blau-dunkel: #163A5C;
    --hbg-blau: #245688;
    --hbg-blau-mittel: #6C93B8;
    --hbg-blau-blass: #CBDBE9;
    --hbg-blau-ghost: #EFF4F9;
    --hbg-gruen-dunkel: #2F4A38;
    --hbg-gruen: #3F6B4D;
    --hbg-gruen-mittel: #7C9C82;
    --hbg-gruen-blass: #D6E3D2;
    --hbg-gruen-ghost: #EFF5EE;
    --hbg-text: #2B2B2B;
    --hbg-text-muted: #6B6B6B;
    --hbg-border: #D9D5CF;
    --hbg-bg: #F7F5F2;
    --hbg-weiss: #FFFFFF;
    --hbg-warnung: #B8791E;
    --hbg-fehler: #A62B2B;
    --hbg-erfolg: #2E6E6E;
    --hbg-sandstein: #C9A876;

    --font-title: "Gagalin", "Anton", "Archivo Black", sans-serif;
    --font-body: "Glacial Indifference", "Jost", "Mulish", "Helvetica Neue", Arial, sans-serif;

    --navy: var(--hbg-blau-dunkel);
    --navy-mid: var(--hbg-blau);
    --navy-light: var(--hbg-blau-mittel);
    --accent: var(--hbg-rot);
    --accent-dim: var(--hbg-rot-mittel);
    --sage: var(--hbg-gruen);
    --bg: var(--hbg-bg);
    --bg-card: var(--hbg-weiss);
    --text: var(--hbg-text);
    --text-mid: var(--hbg-text);
    --text-light: var(--hbg-text-muted);
    --border: var(--hbg-border);
    --done-bg: var(--hbg-gruen-ghost);
    --done-text: var(--hbg-gruen-dunkel);

    --c-lernen-bg: var(--hbg-blau-ghost);
    --c-lernen-border: var(--hbg-blau);
    --c-lernen-badge: var(--hbg-blau-dunkel);
    --c-lernen-tint: var(--hbg-blau-blass);
    --c-struktur-bg: var(--hbg-gruen-ghost);
    --c-struktur-border: var(--hbg-gruen);
    --c-struktur-badge: var(--hbg-gruen-dunkel);
    --c-struktur-tint: var(--hbg-gruen-blass);
    --c-komm-bg: var(--hbg-rot-ghost);
    --c-komm-border: var(--hbg-rot);
    --c-komm-badge: var(--hbg-rot-dunkel);
    --c-komm-tint: var(--hbg-rot-blass);
    --c-steuer-bg: #FBF7EF;
    --c-steuer-border: var(--hbg-sandstein);
    --c-steuer-badge: #7A5B2F;
    --c-steuer-tint: #EFE0C6;
  }

  *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
  html { scroll-behavior:smooth; }
  body {
    min-height: 100vh;
    font-family: var(--font-body);
    color: var(--hbg-text);
    background:
      radial-gradient(circle at top left, rgba(36,86,136,0.12), transparent 30rem),
      radial-gradient(circle at bottom right, rgba(121,29,34,0.10), transparent 32rem),
      var(--hbg-bg);
    font-size: 16px;
    line-height: 1.64;
  }
  #loading {
    max-width: 720px;
    margin: 12vh auto;
    padding: 28px 32px;
    border-radius: 22px;
    background: var(--hbg-weiss);
    border: 1px solid var(--hbg-border);
    box-shadow: 0 22px 55px rgba(22,58,92,0.13);
  }
  #loading strong {
    display:block;
    font-family: var(--font-title);
    font-weight:400;
    color: var(--hbg-rot);
    font-size:1.6rem;
    margin-bottom:0.35rem;
  }
  #app:empty { display:none; }

  header {
    background: linear-gradient(120deg, var(--hbg-blau-dunkel), var(--hbg-blau));
    color: var(--hbg-weiss);
    padding: 30px 40px 26px;
    box-shadow: 0 12px 32px rgba(22,58,92,0.18);
  }
  .header-inner {
    max-width: 1080px;
    margin: 0 auto;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:16px;
  }
  .header-left::before {
    content: "HEINRICH-BÖLL-GESAMTSCHULE · Für dich. Für mich. Für uns.";
    display:inline-block;
    background: var(--hbg-weiss);
    color: var(--hbg-rot);
    border-left: 7px solid var(--hbg-rot);
    border-radius: 14px;
    padding: 9px 13px;
    margin-bottom: 16px;
    font-family: var(--font-title);
    font-weight: 400;
    letter-spacing: 0.04em;
    line-height: 1.15;
    box-shadow: 0 10px 24px rgba(0,0,0,0.16);
  }
  .header-kuerzel {
    font-size: 0.7rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--hbg-rot-blass);
    font-weight: 400;
    margin-bottom: 8px;
  }
  header h1 {
    font-family: var(--font-title);
    font-weight: 400;
    font-size: clamp(2rem, 4vw, 3.35rem);
    line-height: 1.04;
    margin-bottom: 6px;
    letter-spacing: 0.02em;
  }
  header h1 strong { font-weight:400; }
  .header-sub { color: rgba(255,255,255,0.80); font-size: 0.95rem; }
  .header-stand { font-size:0.78rem; color:rgba(255,255,255,0.72); text-align:right; white-space:nowrap; }
  .header-stand strong { display:block; color:var(--hbg-weiss); font-size:0.82rem; font-weight:400; }

  .intro-banner {
    background: var(--hbg-rot);
    color: var(--hbg-weiss);
    padding: 15px 40px;
  }
  .intro-banner-inner { max-width:1080px; margin:0 auto; font-size:0.94rem; }
  main { max-width:1080px; margin:0 auto; padding: 38px 40px 28px; }

  .section-label {
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--hbg-blau-dunkel);
    font-weight: 400;
    margin-bottom: 16px;
    margin-top: 42px;
    padding-bottom: 9px;
    border-bottom: 2px solid var(--hbg-blau-blass);
  }
  .section-label:first-child { margin-top:0; }

  .kachel-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:14px; }
  .kachel {
    background: var(--hbg-weiss);
    border: 1.5px solid var(--hbg-border);
    border-radius: 20px;
    overflow:hidden;
    cursor:pointer;
    transition: transform 0.18s, border-color 0.2s, box-shadow 0.2s;
    user-select:none;
    box-shadow: 0 12px 30px rgba(22,58,92,0.07);
  }
  .kachel:hover { transform: translateY(-2px); box-shadow:0 18px 38px rgba(22,58,92,0.12); }
  .kachel.open { box-shadow:0 22px 46px rgba(22,58,92,0.15); }
  .kachel.lernen { border-color: var(--c-lernen-border); background: var(--c-lernen-bg); }
  .kachel.struktur { border-color: var(--c-struktur-border); background: var(--c-struktur-bg); }
  .kachel.komm { border-color: var(--c-komm-border); background: var(--c-komm-bg); }
  .kachel.steuer { border-color: var(--c-steuer-border); background: #FBF7EF; }
  .kachel-head { padding: 17px 17px 15px; }
  .kachel-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:9px; }
  .kachel-badge {
    font-size:0.62rem;
    letter-spacing:0.09em;
    text-transform:uppercase;
    padding:4px 9px;
    border-radius:999px;
    color:var(--hbg-weiss);
    font-weight:400;
  }
  .lernen .kachel-badge { background: var(--c-lernen-badge); }
  .struktur .kachel-badge { background: var(--c-struktur-badge); }
  .komm .kachel-badge { background: var(--c-komm-badge); }
  .steuer .kachel-badge { background: var(--c-steuer-badge); }
  .kachel-chevron { color: var(--hbg-text-muted); transition: transform 0.25s; }
  .kachel.open .kachel-chevron { transform: rotate(180deg); }
  .kachel-icon { font-size:1.6rem; line-height:1; margin-bottom:8px; display:block; }
  .kachel-title {
    font-family: var(--font-title);
    font-weight:400;
    font-size:1.08rem;
    color: var(--hbg-blau-dunkel);
    line-height:1.12;
    margin-bottom:7px;
    letter-spacing:0.01em;
  }
  .kachel-teaser { font-size:0.84rem; color:var(--hbg-text); line-height:1.45; }
  .kachel-body {
    display:none;
    padding:17px;
    border-top:1.5px solid var(--hbg-border);
    font-size:0.88rem;
    color:var(--hbg-text);
    background: rgba(255,255,255,0.92);
  }
  .kachel.open .kachel-body { display:block; }
  .kachel-body p { margin-bottom:9px; }
  .kachel-body ul { margin:8px 0; padding-left:18px; }
  .kachel-body li { margin-bottom:4px; }
  .kachel-body .zitat {
    background: var(--hbg-bg);
    border-left:4px solid var(--hbg-rot);
    padding:10px 12px;
    border-radius:0 10px 10px 0;
    color:var(--hbg-text);
    margin:10px 0;
  }
  .kachel-body .hinweis {
    background: var(--hbg-rot-ghost);
    border:1px solid var(--hbg-rot-blass);
    border-radius:10px;
    padding:10px 12px;
    color:var(--hbg-rot-dunkel);
    margin-top:10px;
  }
  .kachel-actions { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
  .btn-small {
    font-family: var(--font-body);
    font-size:0.78rem;
    padding:7px 15px;
    border-radius:999px;
    border:1.5px solid var(--hbg-border);
    background:var(--hbg-weiss);
    color:var(--hbg-text);
    cursor:pointer;
    transition:all 0.15s;
  }
  .btn-small:hover { background:var(--hbg-blau); color:var(--hbg-weiss); border-color:var(--hbg-blau); }
  .btn-small.danger:hover { background:var(--hbg-fehler); border-color:var(--hbg-fehler); color:var(--hbg-weiss); }
  .btn-small.print:hover { background:var(--hbg-rot); border-color:var(--hbg-rot); color:var(--hbg-weiss); }

  .checklist-wrap {
    background:var(--hbg-weiss);
    border:1.5px solid var(--hbg-border);
    border-radius:18px;
    overflow:hidden;
    margin-top:8px;
    box-shadow: 0 14px 34px rgba(22,58,92,0.08);
  }
  .checklist-head,
  .checklist-row {
    display:grid;
    grid-template-columns: 48px 1fr 2fr;
  }
  .checklist-head {
    background:var(--hbg-blau-dunkel);
    color:var(--hbg-weiss);
    font-size:0.74rem;
    font-weight:400;
    letter-spacing:0.06em;
    text-transform:uppercase;
  }
  .checklist-head div, .checklist-row > div { padding:11px 14px; border-right:1px solid var(--hbg-border); }
  .checklist-head div { border-right-color:rgba(255,255,255,0.14); }
  .checklist-head div:last-child, .checklist-row > div:last-child { border-right:none; }
  .checklist-row { border-bottom:1px solid var(--hbg-border); align-items:stretch; transition: background 0.2s; }
  .checklist-row:last-child { border-bottom:none; }
  .checklist-row.done { background:var(--hbg-gruen-ghost); }
  .check-cell { display:flex; align-items:center; justify-content:center; }
  input[type="checkbox"] { width:18px; height:18px; accent-color:var(--hbg-rot); cursor:pointer; }
  .label-cell { font-weight:400; color:var(--hbg-blau-dunkel); }
  textarea {
    width:100%;
    min-height:42px;
    resize:vertical;
    border:1px solid var(--hbg-border);
    border-radius:10px;
    padding:8px 10px;
    font-family:var(--font-body);
    color:var(--hbg-text);
    background:var(--hbg-bg);
  }
  textarea:focus { outline:2px solid var(--hbg-blau-blass); border-color:var(--hbg-blau); background:var(--hbg-weiss); }
  .progress-wrap { margin-top:14px; display:flex; align-items:center; gap:14px; color:var(--hbg-text-muted); font-size:0.85rem; }
  .progress-bar { flex:1; height:10px; background:var(--hbg-blau-ghost); border-radius:999px; overflow:hidden; border:1px solid var(--hbg-blau-blass); }
  .progress-fill { height:100%; background:linear-gradient(90deg, var(--hbg-rot), var(--hbg-blau)); border-radius:999px; transition:width 0.2s; }

  footer {
    max-width:1080px;
    margin:22px auto 0;
    padding:18px 40px 34px;
    color:var(--hbg-text-muted);
    font-size:0.78rem;
    display:flex;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
    border-top:1px solid var(--hbg-border);
  }
  footer a { color:var(--hbg-rot); text-decoration:none; border-bottom:1px solid var(--hbg-rot-blass); }
  footer a:hover { color:var(--hbg-blau); border-bottom-color:var(--hbg-blau-blass); }
  a { color:var(--hbg-rot); }

  @media print {
    body { background:var(--hbg-weiss); }
    header, .intro-banner, .kachel-actions, footer { box-shadow:none; }
    .kachel { box-shadow:none; break-inside:avoid; }
    .kachel-body { display:block !important; }
  }
  @media (max-width: 900px) {
    .kachel-grid { grid-template-columns:repeat(2,1fr); }
    main, header, .intro-banner, footer { padding-left:28px; padding-right:28px; }
  }
  @media (max-width: 680px) {
    .kachel-grid { grid-template-columns:1fr; }
    main { padding:28px 20px 22px; }
    header, .intro-banner, footer { padding-left:20px; padding-right:20px; }
    .header-stand { text-align:left; white-space:normal; }
    .checklist-head { display:none; }
    .checklist-row { grid-template-columns:42px 1fr; }
    .ergebnis-cell { grid-column:1 / -1; border-top:1px solid var(--hbg-border); }
  }
</style>
</head>
<body>
<div id="loading"><strong>Startpaket im HBG Design</strong>Die interaktive Startpaket-Seite wird geladen.</div>
<div id="app"></div>
<script>
(async function initStart() {
  const app = document.getElementById('app');
  const loading = document.getElementById('loading');
  try {
    const response = await fetch('/start.html', { cache: 'no-store' });
    if (!response.ok) throw new Error('start.html konnte nicht geladen werden');
    const source = await response.text();
    const parsed = new DOMParser().parseFromString(source, 'text/html');
    app.innerHTML = parsed.body.innerHTML;
    loading.remove();

    document.querySelectorAll('a[href="https://srl-5.vercel.app"]').forEach(link => {
      link.setAttribute('href', '/');
      link.textContent = 'Vollständiges Arbeitspapier → Startseite';
    });
    setupStartInteractions();
  } catch (error) {
    loading.innerHTML = '<strong>Fehler beim Laden</strong>Die ursprüngliche start.html konnte nicht eingebunden werden. Bitte die Datei direkt prüfen.';
    console.error(error);
  }
})();

const STORAGE_KEY = 'srl5_startpaket';
function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
}
function updateRow(rowNum, checked) {
  const row = document.getElementById('row-' + rowNum);
  if (!row) return;
  checked ? row.classList.add('done') : row.classList.remove('done');
}
function updateProgress() {
  const total = document.querySelectorAll('.checklist-row').length || 9;
  const done = document.querySelectorAll('.checklist-row.done').length;
  const text = document.getElementById('progress-text');
  const fill = document.getElementById('progress-fill');
  if (text) text.textContent = done + ' von ' + total + ' erledigt';
  if (fill) fill.style.width = (done / total * 100) + '%';
}
function setupStartInteractions() {
  const data = loadData();

  document.querySelectorAll('.kachel').forEach(k => {
    k.addEventListener('click', event => {
      if (event.target.closest('button, a, input, textarea')) return;
      k.classList.toggle('open');
    });
  });

  for (let i = 1; i <= 9; i++) {
    const cb = document.querySelector('input[data-row="' + i + '"]');
    const ta = document.querySelector('textarea[data-row="' + i + '"]');
    if (cb && data['check_' + i]) { cb.checked = true; updateRow(i, true); }
    if (ta && data['text_' + i]) { ta.value = data['text_' + i]; }
  }
  updateProgress();

  document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', () => {
      const row = parseInt(cb.dataset.row, 10);
      const d = loadData();
      d['check_' + row] = cb.checked;
      saveData(d);
      updateRow(row, cb.checked);
      updateProgress();
    });
  });

  let timer;
  document.querySelectorAll('textarea').forEach(ta => {
    ta.addEventListener('input', () => {
      clearTimeout(timer);
      timer = setTimeout(() => {
        const row = parseInt(ta.dataset.row, 10);
        const d = loadData();
        d['text_' + row] = ta.value;
        saveData(d);
      }, 400);
    });
  });

  const expand = document.getElementById('btn-expand');
  const collapse = document.getElementById('btn-collapse');
  const reset = document.getElementById('btn-reset');
  const print = document.getElementById('btn-print');

  if (expand) expand.addEventListener('click', () => document.querySelectorAll('.kachel').forEach(k => k.classList.add('open')));
  if (collapse) collapse.addEventListener('click', () => document.querySelectorAll('.kachel').forEach(k => k.classList.remove('open')));
  if (reset) reset.addEventListener('click', () => {
    if (!confirm('Alle Häkchen und Einträge wirklich löschen?')) return;
    localStorage.removeItem(STORAGE_KEY);
    document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
    document.querySelectorAll('textarea').forEach(ta => ta.value = '');
    document.querySelectorAll('.checklist-row').forEach(r => r.classList.remove('done'));
    updateProgress();
  });
  if (print) print.addEventListener('click', () => {
    const wasOpen = [];
    document.querySelectorAll('.kachel').forEach((k, i) => {
      wasOpen[i] = k.classList.contains('open');
      k.classList.add('open');
    });
    window.print();
    setTimeout(() => {
      document.querySelectorAll('.kachel').forEach((k, i) => {
        if (!wasOpen[i]) k.classList.remove('open');
      });
    }, 500);
  });
}
</script>
</body>
</html>
