<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBG · SRL Klasse 5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="hbg-cd.css">
</head>
<body class="loading" data-page="main">
<div id="loading"><strong>HBG Design wird geladen</strong>Das Arbeitspapier wird mit dem Corporate Design der Heinrich-Böll-Gesamtschule aufgebaut.</div>
<div id="app"></div>
<script>
(async function init(){
  const app=document.getElementById('app');
  const loading=document.getElementById('loading');
  try{
    const response=await fetch('/original-index.html',{cache:'no-store'});
    if(!response.ok) throw new Error('original-index.html konnte nicht geladen werden');
    const source=await response.text();
    const parsed=new DOMParser().parseFromString(source,'text/html');
    app.innerHTML=parsed.body.innerHTML;
    document.body.classList.remove('loading');
    loading.remove();
    document.querySelectorAll('a[href^="https://srl-5.vercel.app/#"]').forEach(link=>link.setAttribute('href','#'+link.href.split('#')[1]));
    document.querySelectorAll('a[href="start.html"],a[href="/start.html"],a[href="start-cd.html"]').forEach(link=>link.setAttribute('href','start.html'));
    const sidebarLogo=document.querySelector('.sidebar-logo');
    if(sidebarLogo&&!sidebarLogo.querySelector('.hbg-brand')){
      sidebarLogo.insertAdjacentHTML('afterbegin','<div class="hbg-brand"><div class="hbg-brand-main">HEINRICH-BÖLL-<br>GESAMTSCHULE</div><div class="hbg-brand-sub">Für dich. Für mich. Für uns.</div></div>');
    }
    parsed.querySelectorAll('script').forEach(oldScript=>{
      const script=document.createElement('script');
      [...oldScript.attributes].forEach(attr=>script.setAttribute(attr.name,attr.value));
      script.textContent=oldScript.textContent;
      document.body.appendChild(script);
    });
  }catch(error){
    loading.innerHTML='<strong>Fehler beim Laden</strong>Die gesicherte Originalseite konnte nicht eingebunden werden.';
    console.error(error);
  }
})();
</script>
</body>
</html>
